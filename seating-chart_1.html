<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Bella & David — Seating Chart</title>
<style>
  * { box-sizing: border-box; }
  body { margin:0; font-family: Calibri, Arial, sans-serif; background:#f4f1ea; color:#2a2a2a; }
  header { background:#3d4a3d; color:#fff; padding:10px 18px; display:flex; align-items:center; gap:18px; flex-wrap:wrap; }
  header h1 { font-size:18px; margin:0; font-weight:600; letter-spacing:.3px; }
  .counter { font-size:13px; background:#ffffff22; padding:4px 10px; border-radius:20px; }
  .counter b { color:#ffe08a; }
  .warn { color:#ffd27a; font-size:13px; }
  .controls button { font-family:inherit; font-size:13px; padding:5px 12px; border:0; border-radius:6px; cursor:pointer; background:#ffffff; color:#333; margin-left:6px; }
  .controls button:hover { background:#ffe08a; }
  .wrap { display:flex; height:calc(100vh - 52px); }
  #sidebar { width:260px; background:#fffdf8; border-right:1px solid #e3ddd0; overflow:auto; padding:10px; flex-shrink:0; }
  #sidebar h2 { font-size:13px; text-transform:uppercase; letter-spacing:.5px; color:#7a7263; margin:12px 4px 6px; }
  .hint { font-size:12px; color:#8a8170; padding:4px 4px 10px; line-height:1.4; }
  .grp { margin-bottom:4px; }
  .grp-label { font-size:11px; color:#a59c88; padding:2px 4px; }
  .chip { display:block; width:100%; text-align:left; font-size:13px; padding:5px 8px; margin:2px 0; border:1px solid #e0d9c8; border-radius:6px; background:#fff; cursor:pointer; }
  .chip:hover { border-color:#b9a86a; }
  .chip.sel { background:#3d4a3d; color:#fff; border-color:#3d4a3d; }
  .chip.seated { opacity:.45; text-decoration:line-through; }
  .chip .where { float:right; font-size:11px; color:#b08a3a; text-decoration:none; }
  #floor { flex:1; overflow:auto; position:relative; }
  #canvas { position:relative; width:1180px; height:820px; margin:20px auto; }
  .table { position:absolute; border:2.5px solid #3d4a3d; border-radius:10px; background:#fbf7ee; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:600; color:#3d4a3d; text-align:center; }
  .chair { position:absolute; width:30px; height:26px; border:1.5px solid #9a8f78; border-radius:5px; background:#fff; font-size:9px; line-height:1.05; display:flex; align-items:center; justify-content:center; text-align:center; cursor:pointer; overflow:hidden; padding:1px; color:#333; }
  .chair:hover { border-color:#3d4a3d; }
  .chair.filled { background:#3d4a3d; color:#fff; border-color:#3d4a3d; font-weight:600; }
  .chair.empty { color:#bbb; }
  @media print {
    header .controls, #sidebar, .hint { display:none; }
    .wrap { height:auto; }
    #floor { overflow:visible; }
    body { background:#fff; }
  }
</style>
<header>
  <h1>Bella &amp; David — Seating Chart</h1>
  <div class="counter">Seated: <b id="cSeated">0</b> / <span id="cTotal">71</span> &nbsp;·&nbsp; Seats: <b id="cChairs">70</b></div>
  <div class="warn" id="warn"></div>
  <div class="controls" style="margin-left:auto">
    <button onclick="window.print()">🖨 Print</button>
    <button onclick="exportText()">⧉ Copy list</button>
    <button onclick="resetAll()">↺ Reset</button>
  </div>
</header>
<div class="wrap">
  <div id="sidebar">
    <div class="hint">Click a guest, then click a chair to seat them. Click a filled chair to free it.<br>Saved automatically and shared with everyone who has this link — changes appear within a few seconds.</div>
    <div id="guestList"></div>
  </div>
  <div id="floor"><div id="canvas"></div></div>
</div>
<script>
const GUESTS = [
 ["Škodovka","Škodovka +"],["Monika","Škodovka +"],
 ["Eliška","Eliška +"],["Migas","Eliška +"],
 ["Milan Choulík","Choulík"],["Martina Choulíková","Choulík"],
 ["Martin Palcút","Palcút"],["Ivana Palcútová","Palcút"],
 ["Ondřej Slanina","Slanina"],["Veronika","Slanina"],
 ["Zuzka","Zuzka +"],["Eda","Zuzka +"],
 ["Radka Večlová","Večl"],["Ondřej Večl","Večl"],
 ["Tereza Kořánová","Kořán"],["Tobiáš Kořán","Kořán"],["Anna Reinišová","(single)"],
 ["Káťa","Káťa +"],["Lukáš","Káťa +"],
 ["Marta Kobulská","Kobulská/Slánský"],["Jan Slánský","Kobulská/Slánský"],["Tobiáš Slánský","Kobulská/Slánský"],
 ["Tomáš Kolínský","Kolínský"],["Denisa Kolínská","Kolínský"],["Maya","Kolínský"],
 ["Jan Hemala","Hemala"],["Aisha Hemalová","Hemala"],
 ["Marketa Lafatova","Lafatova"],["Jaroslav Horsky","Lafatova"],
 ["Kryštof Kovářík","Kovářík"],["Zuzana Nováková","Kovářík"],
 ["Vojtěch Kužel","Vojtěch Kužel"],["Simona Kuželová","Vojtěch Kužel"],
 ["Jakub Hodina","Hodina"],["Kateřina Hodinová","Hodina"],["Šimon Hodina (2y)","Hodina"],
 ["Ondřej Kužel","Ondřej Kužel"],["Kamila","Ondřej Kužel"],["Sofie (dcera)","Ondřej Kužel"],
 ["Petr Vecko","Vecko"],["Ludmila Zayat","Vecko"],["Valerie Vecková","Vecko"],
 ["Pavla Voborníková","Voborník"],["Pavlík Voborník (syn)","Voborník"],["Pavla Šišková (babička)","Voborník"],
 ["Diana Voborníková","Diana V."],["Vítězslav Janča","Diana V."],
 ["Václav Pecka","Václav Pecka"],["Jiřina Pecková","Václav Pecka"],["Emma Pecková (1,5r)","Václav Pecka"],
 ["Sabina Banašíková","Banašík"],["Robin Banašík","Banašík"],
 ["Lucie Brašničková","Brašnička"],["Jaroslav Brašnička","Brašnička"],
 ["Karolína Šišková","(single)"],
 ["Ondřej Pecka","(single)"],
 ["Mirka Pecková","(single)"],
 ["Mirka Šišková","M. Šišková"],["Libor Šiška","M. Šišková"],
 ["Eva Bušinová","Bušinová"],["Karel Bohdálek","Bušinová"],
 ["Petr Hučko","(single)"],
 ["Ondřej Leština","Leština"],["Natálie Pokorká","Leština"],
 ["Aleš Zeman","Zeman"],["Michaela Válková","Zeman"],
 ["Václav Kápl","Kápl"],["Václav Kápl ml.","Kápl"],
 ["Jessica Sierra","(single)"],
 ["Faycal","(single)"],
 ["Khald Ansari","(single)"]
];

const TABLES = [
 {id:'A',   name:'Table A',    x:60,  y:50,  w:210, h:115, sides:{top:3,bottom:3}},
 {id:'head',name:'Head Table', x:475, y:70,  w:250, h:95,  sides:{top:6}},
 {id:'B',   name:'Table B',    x:910, y:50,  w:210, h:115, sides:{top:3,bottom:3}},
 {id:'1',   name:'Table 1',    x:300, y:300, w:120, h:470, sides:{left:13,right:13}},
 {id:'2',   name:'Table 2',    x:760, y:300, w:120, h:470, sides:{left:13,right:13}},
];

const CS = 30, CH = 26, GAP = 5;
let chairs = [];
let assign = {};
let selected = null;

function buildChairs(){
  const canvas = document.getElementById('canvas');
  canvas.innerHTML='';
  chairs=[];
  TABLES.forEach(t=>{
    const d=document.createElement('div');
    d.className='table'; d.style.left=t.x+'px'; d.style.top=t.y+'px';
    d.style.width=t.w+'px'; d.style.height=t.h+'px'; d.textContent=t.name;
    canvas.appendChild(d);
    const place=(side,n)=>{
      for(let i=0;i<n;i++){
        let cx,cy;
        if(side==='top'||side==='bottom'){
          cx=t.x + (t.w/(n+1))*(i+1) - CS/2;
          cy=(side==='top') ? t.y-CH-GAP : t.y+t.h+GAP;
        } else {
          cy=t.y + (t.h/(n+1))*(i+1) - CH/2;
          cx=(side==='left') ? t.x-CS-GAP : t.x+t.w+GAP;
        }
        const key=`${t.id}-${side}-${i}`;
        const c=document.createElement('div');
        c.className='chair empty'; c.style.left=cx+'px'; c.style.top=cy+'px';
        c.dataset.key=key; c.textContent='+';
        c.onclick=()=>chairClick(key);
        canvas.appendChild(c);
        chairs.push({key,el:c});
      }
    };
    Object.entries(t.sides).forEach(([s,n])=>place(s,n));
  });
  document.getElementById('cChairs').textContent=chairs.length;
}

function shortName(full){
  const p=full.replace(/\s*\(.*?\)/,'').trim().split(' ');
  return p.length>1 ? p[0]+' '+p[1][0]+'.' : p[0];
}

function chairClick(key){
  if(assign[key]!=null){
    delete assign[key];
  } else if(selected!=null){
    for(const k in assign){ if(assign[k]===selected) delete assign[k]; }
    assign[key]=selected;
    selected=null;
  }
  save(); render();
}

function selectGuest(i){
  selected = (selected===i)? null : i;
  render();
}

function render(){
  chairs.forEach(c=>{
    const g=assign[c.key];
    if(g!=null){ c.el.className='chair filled'; c.el.textContent=shortName(GUESTS[g][0]); c.el.title=GUESTS[g][0]; }
    else { c.el.className='chair empty'; c.el.textContent='+'; c.el.title=''; }
  });
  const seatOf={};
  for(const k in assign){ seatOf[assign[k]] = tableLabel(k); }
  const list=document.getElementById('guestList');
  list.innerHTML='';
  const groups={};
  GUESTS.forEach((g,i)=>{ (groups[g[1]]=groups[g[1]]||[]).push(i); });
  for(const gname in groups){
    const box=document.createElement('div'); box.className='grp';
    const lbl=document.createElement('div'); lbl.className='grp-label'; lbl.textContent=gname;
    box.appendChild(lbl);
    groups[gname].forEach(i=>{
      const b=document.createElement('button');
      b.className='chip'+(selected===i?' sel':'')+(seatOf[i]?' seated':'');
      b.onclick=()=>selectGuest(i);
      b.innerHTML = GUESTS[i][0] + (seatOf[i]?`<span class="where">${seatOf[i]}</span>`:'');
      box.appendChild(b);
    });
    list.appendChild(box);
  }
  const seated=Object.keys(assign).length;
  document.getElementById('cSeated').textContent=seated;
  const w=document.getElementById('warn');
  const unseated=GUESTS.length-seated;
  w.textContent = unseated>0 ? `${unseated} guest(s) not yet seated — only ${chairs.length} seats for ${GUESTS.length} guests` : 'All guests seated ✓';
}

function tableLabel(key){
  const id=key.split('-')[0];
  const t=TABLES.find(x=>x.id===id); return t?t.name.replace('Table ','T'):id;
}

/* ---- Shared persistence ----
   Saves to the server (/api/seating) so everyone with the link edits ONE
   shared chart. localStorage is an instant-paint cache + offline fallback.
   Last write wins; we poll so editors see each other's changes. */
const API='/api/seating';
const STORE_KEY='bd_seating';
let lastSync=0;
let applyingRemote=false;
let pushTimer=null;

function saveLocal(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(assign)); }catch(e){} }
function loadLocal(){ try{ const s=localStorage.getItem(STORE_KEY); if(s) assign=JSON.parse(s)||{}; }catch(e){} }

function pushRemote(){
  clearTimeout(pushTimer);
  pushTimer=setTimeout(async()=>{
    try{
      const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({assign})});
      const d=await r.json();
      if(d&&d.updatedAt) lastSync=d.updatedAt;
    }catch(e){}
  },500);
}

function save(){ saveLocal(); if(!applyingRemote) pushRemote(); }

function applyRemote(d){
  applyingRemote=true;
  assign = d.assign||{};
  lastSync = d.updatedAt||0;
  selected = null;
  saveLocal();
  render();
  applyingRemote=false;
}

async function syncFromServer(){
  try{
    const r=await fetch(API,{cache:'no-store'});
    const d=await r.json();
    const serverCount = d&&d.assign ? Object.keys(d.assign).length : 0;
    const localCount = Object.keys(assign).length;
    if((!d||!d.updatedAt) && serverCount===0 && localCount>0){
      pushRemote();           // server empty but we have a local plan -> push it up
    } else if(d){
      applyRemote(d);
    }
  }catch(e){}
}

async function poll(){
  if(applyingRemote) return;
  try{
    const r=await fetch(API,{cache:'no-store'});
    const d=await r.json();
    if(d&&(d.updatedAt||0)>lastSync) applyRemote(d);
  }catch(e){}
}

function resetAll(){ if(confirm('Clear all seat assignments?')){ assign={}; selected=null; save(); render(); } }

function exportText(){
  let out='BELLA & DAVID — SEATING\n\n';
  TABLES.forEach(t=>{
    out+=t.name+':\n';
    chairs.filter(c=>c.key.startsWith(t.id+'-')).forEach((c,idx)=>{
      const g=assign[c.key];
      out+=`  ${idx+1}. ${g!=null?GUESTS[g][0]:'—'}\n`;
    });
    out+='\n';
  });
  const unseated=GUESTS.filter((g,i)=>!Object.values(assign).includes(i));
  if(unseated.length){ out+='NOT SEATED:\n'+unseated.map(g=>'  '+g[0]).join('\n'); }
  navigator.clipboard.writeText(out).then(()=>alert('Seating list copied to clipboard.'),()=>{
    prompt('Copy the list below:', out);
  });
}

document.getElementById('cTotal').textContent=GUESTS.length;
buildChairs();
loadLocal();
render();
syncFromServer();
setInterval(poll, 4000);
</script>
