<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Bella & David — Seating Chart</title>
<style>
  * { box-sizing: border-box; }
  body { margin:0; font-family: Calibri, Arial, sans-serif; background:#f4f1ea; color:#2a2a2a; }
  header { background:#3d4a3d; color:#fff; padding:10px 18px; display:flex; align-items:center; gap:18px; flex-wrap:wrap; }
  header h1 { font-size:18px; margin:0; font-weight:600; letter-spacing:.3px; }
  .counter { font-size:13px; background:#ffffff22; padding:4px 10px; border-radius:20px; }
  .counter b { color:#ffe08a; }
  .warn { color:#ffd27a; font-size:13px; }
  .controls button { font-family:inherit; font-size:13px; padding:5px 12px; border:0; border-radius:6px; cursor:pointer; background:#ffffff; color:#333; margin-left:6px; }
  .controls button:hover { background:#ffe08a; }
  .wrap { display:flex; height:calc(100vh - 52px); }
  #sidebar { width:260px; background:#fffdf8; border-right:1px solid #e3ddd0; overflow:auto; padding:10px; flex-shrink:0; }
  .addbox { display:flex; gap:6px; margin:2px 2px 8px; }
  .addbox input { flex:1; font-family:inherit; font-size:14px; padding:7px 9px; border:1px solid #d8cfbb; border-radius:6px; }
  .addbox input:focus { outline:none; border-color:#3d4a3d; }
  .addbox button { font-family:inherit; font-size:13px; padding:7px 12px; border:0; border-radius:6px; cursor:pointer; background:#3d4a3d; color:#fff; }
  .addbox button:hover { background:#52634f; }
  .hint { font-size:12px; color:#8a8170; padding:4px 4px 10px; line-height:1.4; }
  .pool-empty { font-size:13px; color:#a59c88; font-style:italic; padding:8px 4px; }
  .chip { display:flex; align-items:center; gap:6px; width:100%; text-align:left; font-size:13px; padding:6px 8px; margin:3px 0; border:1px solid #e0d9c8; border-radius:6px; background:#fff; cursor:grab; }
  .chip:hover { border-color:#b9a86a; }
  .chip.sel { background:#3d4a3d; color:#fff; border-color:#3d4a3d; }
  .chip .nm { flex:1; }
  .chip .x { color:#c0b89f; cursor:pointer; font-size:16px; line-height:1; padding:0 2px; }
  .chip .x:hover { color:#b0463a; }
  .chip.sel .x { color:#cdd6c9; }
  #floor { flex:1; overflow:auto; position:relative; }
  #canvas { position:relative; width:1560px; height:1120px; margin:20px auto; }
  .table { position:absolute; border:2.5px solid #3d4a3d; border-radius:10px; background:#fbf7ee; display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:600; color:#3d4a3d; text-align:center; }
  .chair { position:absolute; width:84px; height:44px; border:1.5px solid #9a8f78; border-radius:6px; background:#fff; font-size:11px; line-height:1.1; display:flex; align-items:center; justify-content:center; text-align:center; cursor:pointer; overflow:hidden; padding:2px 3px; color:#333; word-break:break-word; }
  .chair:hover { border-color:#3d4a3d; }
  .chair.filled { background:#3d4a3d; color:#fff; border-color:#3d4a3d; font-weight:600; cursor:grab; }
  .chair.empty { color:#bbb; }
  .chair.drop { border-color:#b08a3a; box-shadow:0 0 0 2px rgba(176,138,58,.5); background:#fff7e6; }
  @media print {
    header .controls, #sidebar, .hint { display:none; }
    .wrap { height:auto; }
    #floor { overflow:visible; }
    body { background:#fff; }
  }
</style>
<header>
  <h1>Bella &amp; David — Seating Chart</h1>
  <div class="counter">Seated: <b id="cSeated">0</b> / <span id="cTotal">0</span> &nbsp;·&nbsp; Seats: <b id="cChairs">70</b></div>
  <div class="warn" id="warn"></div>
  <div class="controls" style="margin-left:auto">
    <button onclick="window.print()">🖨 Print</button>
    <button onclick="exportText()">⧉ Copy list</button>
    <button onclick="resetAll()">↺ Reset</button>
  </div>
</header>
<div class="wrap">
  <div id="sidebar">
    <div class="addbox">
      <input id="nameInput" placeholder="Guest name" onkeydown="if(event.key==='Enter')addGuest()" autofocus>
      <button onclick="addGuest()">Add</button>
    </div>
    <div class="hint">Add your guests above. Then <b>drag a name onto a chair</b> (or click a name, then click a chair). Click a filled chair to free it.<br>Saved automatically and shared with everyone who has this link.</div>
    <div id="guestList"></div>
  </div>
  <div id="floor"><div id="canvas"></div></div>
</div>
<script>
const TABLES = [
 {id:'A',   name:'Table A',    x:40,   y:120, w:380, h:140, sides:{top:3,bottom:3}},
 {id:'head',name:'Head Table', x:470,  y:130, w:620, h:120, sides:{top:6}},
 {id:'B',   name:'Table B',    x:1140, y:120, w:380, h:140, sides:{top:3,bottom:3}},
 {id:'1',   name:'Table 1',    x:470,  y:360, w:150, h:720, sides:{left:13,right:13}},
 {id:'2',   name:'Table 2',    x:960,  y:360, w:150, h:720, sides:{left:13,right:13}},
];

const CS = 84, CH = 44, GAP = 6;
let chairs = [];
let guests = {};      // id -> { name, seat: chairKey | null }
let nextId = 1;
let selected = null;  // selected guest id

function buildChairs(){
  const canvas = document.getElementById('canvas');
  canvas.innerHTML='';
  chairs=[];
  TABLES.forEach(t=>{
    const d=document.createElement('div');
    d.className='table'; d.style.left=t.x+'px'; d.style.top=t.y+'px';
    d.style.width=t.w+'px'; d.style.height=t.h+'px'; d.textContent=t.name;
    canvas.appendChild(d);
    const place=(side,n)=>{
      for(let i=0;i<n;i++){
        let cx,cy;
        if(side==='top'||side==='bottom'){
          cx=t.x + (t.w/(n+1))*(i+1) - CS/2;
          cy=(side==='top') ? t.y-CH-GAP : t.y+t.h+GAP;
        } else {
          cy=t.y + (t.h/(n+1))*(i+1) - CH/2;
          cx=(side==='left') ? t.x-CS-GAP : t.x+t.w+GAP;
        }
        const key=`${t.id}-${side}-${i}`;
        const c=document.createElement('div');
        c.className='chair empty'; c.style.left=cx+'px'; c.style.top=cy+'px';
        c.dataset.key=key; c.textContent='+';
        c.onclick=()=>chairClick(key);
        c.ondragover=e=>{ e.preventDefault(); c.classList.add('drop'); };
        c.ondragleave=()=>c.classList.remove('drop');
        c.ondrop=e=>{ e.preventDefault(); c.classList.remove('drop'); const id=e.dataTransfer.getData('text/plain'); if(guests[id]) seatGuest(id,key); };
        canvas.appendChild(c);
        chairs.push({key,el:c});
      }
    };
    Object.entries(t.sides).forEach(([s,n])=>place(s,n));
  });
  document.getElementById('cChairs').textContent=chairs.length;
}

function addGuest(){
  const inp=document.getElementById('nameInput');
  const name=inp.value.trim();
  if(!name) return;
  const id='g'+(nextId++);
  guests[id]={name, seat:null};
  inp.value=''; inp.focus();
  save(); render();
}

function removeGuest(id){
  delete guests[id];
  if(selected===id) selected=null;
  save(); render();
}

function selectGuest(id){
  selected = (selected===id) ? null : id;
  render();
}

function seatGuest(id, chairKey){
  for(const k in guests){ if(guests[k].seat===chairKey) guests[k].seat=null; } // free the chair first
  guests[id].seat = chairKey;
  selected = null;
  save(); render();
}

function chairClick(chairKey){
  const occ = Object.keys(guests).find(k=>guests[k].seat===chairKey);
  if(occ){ guests[occ].seat=null; selected=null; save(); render(); return; }
  if(selected!=null) seatGuest(selected, chairKey);
}

function render(){
  chairs.forEach(c=>{
    const occ = Object.keys(guests).find(k=>guests[k].seat===c.key);
    if(occ){
      c.el.className='chair filled'; c.el.textContent=guests[occ].name; c.el.title=guests[occ].name;
      c.el.draggable=true;
      c.el.ondragstart=e=>e.dataTransfer.setData('text/plain', occ);
    } else {
      c.el.className='chair empty'; c.el.textContent='+'; c.el.title='';
      c.el.draggable=false; c.el.ondragstart=null;
    }
  });

  const list=document.getElementById('guestList');
  list.innerHTML='';
  const unseated = Object.keys(guests).filter(id=>!guests[id].seat);
  if(Object.keys(guests).length===0){
    list.innerHTML='<div class="pool-empty">No guests yet — add names above.</div>';
  } else if(unseated.length===0){
    list.innerHTML='<div class="pool-empty">Everyone is seated ✓</div>';
  }
  unseated.forEach(id=>{
    const b=document.createElement('div');
    b.className='chip'+(selected===id?' sel':'');
    b.draggable=true;
    b.ondragstart=e=>e.dataTransfer.setData('text/plain', id);
    b.onclick=ev=>{ if(ev.target.classList.contains('x')) return; selectGuest(id); };
    b.innerHTML='<span class="nm"></span><span class="x" title="Remove">&times;</span>';
    b.querySelector('.nm').textContent=guests[id].name;
    b.querySelector('.x').onclick=()=>removeGuest(id);
    list.appendChild(b);
  });

  const total=Object.keys(guests).length;
  const seated=Object.keys(guests).filter(id=>guests[id].seat).length;
  document.getElementById('cSeated').textContent=seated;
  document.getElementById('cTotal').textContent=total;
  const w=document.getElementById('warn');
  if(total===0){ w.textContent=''; }
  else if(seated<total){ w.textContent=`${total-seated} guest(s) not yet seated`; }
  else { w.textContent='All guests seated ✓'; }
}

function tableLabel(key){
  const id=key.split('-')[0];
  const t=TABLES.find(x=>x.id===id); return t?t.name.replace('Table ','T'):id;
}

/* ---- Shared persistence ----
   Saves to the server (/api/seating) so everyone with the link edits ONE
   shared chart. localStorage is an instant-paint cache + offline fallback.
   Last write wins; we poll so editors see each other's changes. */
const API='/api/seating';
const STORE_KEY='bd_seating';
let lastSync=0;
let applyingRemote=false;
let pushTimer=null;

function saveLocal(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify({guests,nextId})); }catch(e){} }
function loadLocal(){ try{ const s=localStorage.getItem(STORE_KEY); if(s){ const d=JSON.parse(s); guests=d.guests||{}; nextId=d.nextId||1; } }catch(e){} }

function pushRemote(){
  clearTimeout(pushTimer);
  pushTimer=setTimeout(async()=>{
    try{
      const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({guests,nextId})});
      const d=await r.json();
      if(d&&d.updatedAt) lastSync=d.updatedAt;
    }catch(e){}
  },500);
}

function save(){ saveLocal(); if(!applyingRemote) pushRemote(); }

function applyRemote(d){
  applyingRemote=true;
  guests = d.guests||{};
  nextId = d.nextId||1;
  lastSync = d.updatedAt||0;
  if(selected && !guests[selected]) selected=null;
  saveLocal();
  render();
  applyingRemote=false;
}

async function syncFromServer(){
  try{
    const r=await fetch(API,{cache:'no-store'});
    const d=await r.json();
    const serverCount = d&&d.guests ? Object.keys(d.guests).length : 0;
    const localCount = Object.keys(guests).length;
    if((!d||!d.updatedAt) && serverCount===0 && localCount>0){
      pushRemote();           // server empty but we have a local plan -> push it up
    } else if(d){
      applyRemote(d);
    }
  }catch(e){}
}

async function poll(){
  if(applyingRemote) return;
  try{
    const r=await fetch(API,{cache:'no-store'});
    const d=await r.json();
    if(d&&(d.updatedAt||0)>lastSync) applyRemote(d);
  }catch(e){}
}

function resetAll(){
  if(confirm('Clear EVERYTHING — all guests and seats?')){
    guests={}; nextId=1; selected=null; save(); render();
  }
}

function exportText(){
  let out='BELLA & DAVID — SEATING\n\n';
  TABLES.forEach(t=>{
    out+=t.name+':\n';
    chairs.filter(c=>c.key.startsWith(t.id+'-')).forEach((c,idx)=>{
      const occ=Object.keys(guests).find(k=>guests[k].seat===c.key);
      out+=`  ${idx+1}. ${occ?guests[occ].name:'—'}\n`;
    });
    out+='\n';
  });
  const unseated=Object.keys(guests).filter(id=>!guests[id].seat).map(id=>guests[id].name);
  if(unseated.length){ out+='NOT SEATED:\n'+unseated.map(n=>'  '+n).join('\n'); }
  navigator.clipboard.writeText(out).then(()=>alert('Seating list copied to clipboard.'),()=>{
    prompt('Copy the list below:', out);
  });
}

buildChairs();
loadLocal();
render();
syncFromServer();
setInterval(poll, 4000);
</script>
